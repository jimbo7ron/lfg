# defaults.conf -- Sane defaults for all machines. Committed.
#
# To override any value on a specific machine, create machine.conf (gitignored)
# alongside this file and redefine just the DOTS_* you care about, e.g.:
#
#   DOTS_HOSTNAME="mbp-james"
#   DOTS_GIT_EMAIL="you@example.com"
#
# machine.conf is sourced after defaults.conf, so its values win.

DOTS_EDITOR="vim"
DOTS_SHELL="zsh"
DOTS_GIT_NAME="James Morris"
DOTS_GIT_EMAIL="james.s.morris@gmail.com"
DOTS_GIT_CREDENTIAL_HELPER="osxkeychain"
DOTS_TERM="xterm-256color"
DOTS_ZSH_THEME="robbyrussell"
DOTS_ZSH_PLUGINS="git docker z"
DOTS_TMUX_PREFIX="C-b"
DOTS_TMUX_SHELL="/bin/zsh"
DOTS_CLAUDE_PERMISSIONS_ALLOW='["Bash(*)", "Read", "Edit", "Write", "WebFetch", "WebSearch", "Glob", "Grep", "Agent", "Skill", "NotebookEdit"]'
DOTS_CLAUDE_MODEL="claude-sonnet-4-6"
DOTS_PATH_EXTRA=""
DOTS_HISTSIZE="10000"
DOTS_HOSTNAME=""  # empty = leave hostname untouched; set per-machine in machine.conf
