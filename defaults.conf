# defaults.conf -- Sane defaults for all machines
# Override any of these in machine.conf

DOTS_EDITOR="vim"
DOTS_SHELL="zsh"
DOTS_GIT_NAME="James Morris"
DOTS_GIT_EMAIL="james.s.morris@gmail.com"
DOTS_GIT_CREDENTIAL_HELPER="osxkeychain"
DOTS_TERM="xterm-256color"
DOTS_ZSH_THEME="robbyrussell"
DOTS_ZSH_PLUGINS="git docker z"
DOTS_TMUX_PREFIX="C-b"
DOTS_TMUX_SHELL="/bin/zsh"
DOTS_CLAUDE_PERMISSIONS_ALLOW='["Bash(*)", "Read", "Edit", "Write", "WebFetch", "WebSearch", "Glob", "Grep", "Agent", "Skill", "NotebookEdit"]'
DOTS_CLAUDE_MODEL="claude-sonnet-4-6"
DOTS_PATH_EXTRA=""
DOTS_HISTSIZE="10000"
